<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oddsify Intel — Live Sports Hub</title>
<meta name="description" content="Live scores, standings, and odds across MLB, NBA, NCAAB, EPL, Champions League, MLS, and USL Championship.">

<!-- favicon / app icons -->
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
<link rel="manifest" href="site.webmanifest">
<meta name="theme-color" content="#0b0e14">

<!-- social preview -->
<meta property="og:title" content="Oddsify Intel — Live Sports Hub">
<meta property="og:description" content="Live scores, standings, odds, and matchup intel across MLB, NBA, NCAAB, EPL, Champions League, MLS, and USL Championship.">
<meta property="og:image" content="assets/social-preview.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Oddsify Intel — Live Sports Hub">
<meta name="twitter:image" content="assets/social-preview.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="topbar">
    <div class="wordmark">
      <span class="wordmark-mark">◆</span>
      <span class="wordmark-text">ODDSIFY<span class="wordmark-accent">INTEL</span></span>
    </div>
    <div class="topbar-status">
      <span class="status-dot" id="status-dot" aria-hidden="true"></span>
      <span id="status-text">connecting…</span>
      <span class="divider" aria-hidden="true">·</span>
      <span id="last-updated">—</span>
      <button id="refresh-btn" class="btn-refresh" type="button" aria-label="Refresh all data now">refresh</button>
    </div>
  </header>

  <div class="ticker-wrap" id="ticker-wrap" aria-label="Live scores ticker" role="marquee">
    <div class="ticker-track" id="ticker-track">
      <span class="ticker-item ticker-loading">Booting feed…</span>
    </div>
  </div>

  <nav class="league-tabs" id="league-tabs" aria-label="League selector"></nav>

  <main class="board" id="board">
    <!-- panels injected by app.js -->
  </main>

  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal-close" id="modal-close" type="button" aria-label="Close game details">✕</button>
      <div id="modal-body"><p class="empty-note">Loading…</p></div>
    </div>
  </div>

  <footer class="foot">
    <p>Data pulled live from public ESPN scoreboard &amp; standings endpoints. Odds fields display only when a league's feed publishes them — treat every line as informational, not a wagering guarantee. Built for <strong>Oddsify Labs</strong>.</p>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/render.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
